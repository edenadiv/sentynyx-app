name: eval

on:
  pull_request:
    paths:
      - 'apps/desktop/src-tauri/src/detect/**'
      - 'apps/desktop/src-tauri/src/vendetta.rs'
      - 'apps/desktop/src-tauri/eval/**'
      - '.github/workflows/eval.yml'

jobs:
  run-eval:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libonnxruntime-dev || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      # Fast mode (regex + NER): runs on CI without ML models installed.
      # NER will no-op (returns ModelNotLoaded), so effectively measures the
      # regex-only baseline + the merge pipeline. This blocks PRs on regression.
      - name: Run eval — fast mode (hard gate)
        working-directory: apps/desktop/src-tauri
        run: |
          cargo run --bin eval --release -- fast 2>&1 | tee eval-report-fast.txt

      # Full mode (regex + NER + paranoid LLM): report-only. CI doesn't have
      # Qwen/SmolLM2 GGUF so this also no-ops — but the code path is exercised
      # and the report is uploaded as an artifact for manual review.
      - name: Run eval — full mode (report-only)
        working-directory: apps/desktop/src-tauri
        run: |
          cargo run --bin eval --release -- full 2>&1 | tee eval-report-full.txt
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: |
            apps/desktop/src-tauri/eval-report-fast.txt
            apps/desktop/src-tauri/eval-report-full.txt
