name: pages

# Publishes the zero-build interactive demo (Sentynyx.html) to GitHub Pages so
# anyone can try the UI in a browser without installing. The demo runs the real
# renderer logic with simulated streaming — no keys, no data leaves the page.

on:
  push:
    branches: [main]
    paths:
      - "Sentynyx.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble demo site
        run: |
          mkdir -p _site
          cp Sentynyx.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
