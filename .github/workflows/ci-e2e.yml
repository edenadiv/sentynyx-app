name: ci-e2e

# Walks the complete guided tour headlessly against the browser preview:
# every step must advance on its real event (live detection, panel open,
# simulated stream, "Model saw" click, inspector, SSN block) with zero
# uncaught page errors. Catches tour/step-machine regressions that unit
# tests can't see.

on:
  pull_request:
    paths:
      - "apps/desktop/src/**"
      - "apps/desktop/e2e/**"
      - ".github/workflows/ci-e2e.yml"
  push:
    branches: [main]

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guided-tour:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        working-directory: apps/desktop
        run: pnpm exec playwright install --with-deps chromium
      - name: Run guided-tour E2E
        working-directory: apps/desktop
        run: node e2e/run-e2e.mjs
