  <script>
  // Starfield
  (function(){
    const c = document.getElementById('stars');
    const ctx = c.getContext('2d');
    let w,h,stars=[],shoot=[];
    function resize(){ w=c.width=innerWidth*devicePixelRatio; h=c.height=innerHeight*devicePixelRatio; }
    resize(); addEventListener('resize', resize);
    function init(){
      stars = [];
      const N = Math.floor((innerWidth*innerHeight)/3500);
      for(let i=0;i<N;i++){
        stars.push({
          x: Math.random()*w, y: Math.random()*h,
          z: Math.random()*1+0.2,
          r: Math.random()*1.2+0.2,
          tw: Math.random()*Math.PI*2,
          sp: 0.002 + Math.random()*0.01
        });
      }
    }
    init();
    function tick(t){
      ctx.clearRect(0,0,w,h);
      for(const s of stars){
        s.tw += s.sp;
        const a = 0.35 + 0.65*((Math.sin(s.tw)+1)/2) * s.z;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.arc(s.x, s.y, s.r*devicePixelRatio, 0, Math.PI*2);
        ctx.fill();
        // slow parallax drift
        s.x += 0.02*s.z*devicePixelRatio;
        if(s.x>w) s.x=0;
      }
      // occasional shooting star
      if(Math.random()<0.005){
        shoot.push({x:Math.random()*w*0.8, y:Math.random()*h*0.4, vx:8+Math.random()*6, vy:2+Math.random()*2, life:1});
      }
      for(let i=shoot.length-1;i>=0;i--){
        const s = shoot[i];
        ctx.strokeStyle = `rgba(242,255,43,${s.life})`;
        ctx.lineWidth = 1.2*devicePixelRatio;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx*10, s.y - s.vy*10);
        ctx.stroke();
        s.x += s.vx*devicePixelRatio;
        s.y += s.vy*devicePixelRatio;
        s.life -= 0.015;
        if(s.life<=0) shoot.splice(i,1);
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>

  <script>
  // Vendetta Engine — realtime PII / sensitive info detector
  (function(){
    // Demo subset of the real 45-pattern engine (apps/desktop/src-tauri/src/vendetta.rs).
    // Checksum validators included so you can verify it isn't smoke: a Luhn-valid
    // card blocks, a one-digit mutation passes through. Names/orgs are the NER
    // layer's job in the desktop app — no hardcoded name lists here.
    function luhn(ds){ let s=0; for(let i=0;i<ds.length;i++){ let v=ds[ds.length-1-i]; if(i%2===1){ v*=2; if(v>9)v-=9; } s+=v; } return ds.length>0 && s%10===0; }
    function digitsOf(x){ return [...x].filter(c=>c>='0'&&c<='9').map(Number); }
    function creditCard(raw){ const d=digitsOf(raw), n=d.length; if(n<13||n>19) return false;
      const n2=d[0]*10+d[1], n4=((n2*10+d[2])*10)+d[3];
      const brand=(d[0]===4&&[13,16,19].includes(n))||(n2>=51&&n2<=55&&n===16)||(n4>=2221&&n4<=2720&&n===16)||((n2===34||n2===37)&&n===15)||(n4===6011&&n===16)||(n2===65&&n===16);
      return brand && luhn(d); }
    function iban(raw){ const s=raw.replace(/\s/g,''); if(s.length<15||s.length>34) return false;
      if(!/^[A-Z]{2}\d{2}/.test(s)) return false;
      const r=s.slice(4)+s.slice(0,4); let acc=0;
      for(const ch of r){ const v=ch>='0'&&ch<='9'?+ch:(ch>='A'&&ch<='Z'?ch.charCodeAt(0)-55:NaN);
        if(Number.isNaN(v)) return false; acc = v<10 ? (acc*10+v)%97 : (acc*100+v)%97; }
      return acc===1; }
    function vin(raw){ if(raw.length!==17) return false;
      const T={A:1,J:1,B:2,K:2,S:2,C:3,L:3,T:3,D:4,M:4,U:4,E:5,N:5,V:5,F:6,W:6,G:7,P:7,X:7,H:8,Y:8,R:9,Z:9};
      const W=[8,7,6,5,4,3,2,10,0,9,8,7,6,5,4,3,2]; let s=0;
      for(let i=0;i<17;i++){ const c=raw[i]; const v=c>='0'&&c<='9'?+c:T[c]; if(v===undefined) return false; s+=v*W[i]; }
      const r=s%11; return raw[8]===(r===10?'X':String(r)); }
    function entropy(x){ const m=new Map(); for(const c of x) m.set(c,(m.get(c)||0)+1);
      const n=[...x].length; let h=0; for(const c of m.values()){ const p=c/n; h-=p*Math.log2(p); } return h; }
    function credentialValue(raw){ if(raw.length<8) return false;
      if('$%<{['.includes(raw[0])||raw.includes('${')||raw.includes('{{')) return false;
      const l=raw.toLowerCase();
      if(['true','false','null','none','nil','undefined'].includes(l)) return false;
      if(['password','passwd','changeme','example','sample','dummy','placeholder','redacted','secret','your-','your_','xxxx','****','qwerty'].some(p=>l.includes(p))) return false;
      if(!/[\d\W_]/.test(raw)) return false;
      return entropy(raw)>=3.0; }
    function mrzTd3(raw){
      if(raw.length!==44) return false;
      const val=c=> c>='0'&&c<='9' ? +c : c==='<' ? 0 : (c>='A'&&c<='Z' ? c.charCodeAt(0)-55 : null);
      const check=(str,exp)=>{ const w=[7,3,1]; let sum=0;
        for(let i=0;i<str.length;i++){ const v=val(str[i]); if(v===null) return false; sum+=v*w[i%3]; }
        return String(sum%10)===exp; };
      const comp=raw.slice(0,10)+raw.slice(13,20)+raw.slice(21,43);
      return check(raw.slice(0,9),raw[9])&&check(raw.slice(13,19),raw[19])&&check(raw.slice(21,27),raw[27])&&check(comp,raw[43]);
    }
    function validate(kind, raw){
      if(kind==='MRZ') return mrzTd3(raw);
      if(kind==='CREDITCARD') return creditCard(raw);
      if(kind==='IBAN') return iban(raw);
      if(kind==='VIN') return vin(raw);
      if(kind==='CREDENTIAL') return credentialValue(raw);
      if(kind==='IP') return raw.split('.').every(o=>+o<=255);
      return true;
    }
    const PATTERNS = [
      { kind: 'CREDITCARD', re: /\b\d(?:[ -]?\d){12,18}\b/g },
      { kind: 'IBAN',    re: /\b[A-Z]{2}\d{2}(?: ?[A-Z0-9]){11,30}\b/g },
      { kind: 'CREDENTIAL', re: /\b(?:pass(?:word|wd|phrase)|pwd|secret|token|api[_-]?key|access[_-]?key|client[_-]?secret|auth[_-]?token|credentials?)\b["']?\s*(?:=>|[:=])\s*["']?([^\s"'`,;]{8,})/gi, cap: true },
      { kind: 'VIN',     re: /\b[A-HJ-NPR-Z0-9]{17}\b/g },
      { kind: 'MRZ',     re: /(?:^|[^A-Z0-9<])([A-Z0-9<]{9}\d[A-Z<]{3}\d{6}\d[MFX<]\d{6}\d[A-Z0-9<]{14}\d{2})(?=[^A-Z0-9<]|$)/g, cap: true },
      { kind: 'JWT',     re: /\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}/g },
      { kind: 'EMAIL',   re: /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/g },
      { kind: 'PHONE',   re: /\b(?:\+?\d{1,3}[\s.-]?)?(?:\(?\d{3}\)?[\s.-]?)\d{3}[\s.-]?\d{4}\b/g },
      { kind: 'SSN',     re: /\b\d{3}-\d{2}-\d{4}\b/g },
      { kind: 'IP',      re: /\b(?:\d{1,3}\.){3}\d{1,3}\b/g },
      { kind: 'APIKEY',  re: /\b(?:sk-|sk_live_|sk_test_|pk_|rk_live_|AKIA|ASIA|ghp_|gho_|github_pat_|glpat-|xox[baprs]-)[A-Za-z0-9_\-]{10,}\b/g },
      { kind: 'URL',     re: /\bhttps?:\/\/[^\s)]+/g },
      { kind: 'ADDRESS', re: /\b\d{1,5}\s+[A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+){0,3}\s+(?:Street|St|Avenue|Ave|Road|Rd|Blvd|Lane|Ln|Drive|Dr|Court|Ct|Way)\b/g },
      { kind: 'MONEY',   re: /\$\s?\d{1,3}(?:,\d{3})+(?:\.\d+)?|\$\s?\d{4,}(?:\.\d+)?/g },
      { kind: 'EMPID',   re: /\bEMP-\d{4,6}\b/g },
    ];
    // Critical classes that trigger a policy violation (hard block)
    const CRITICAL = {
      SSN: { name:'Social Security number in outbound payload', class:'CRITICAL_IDENTITY',
             desc:'Sentynyx never sends SSNs to a third-party model endpoint. Remove it, or switch to a local model — local sends never leave this machine.' },
      APIKEY: { name:'Live API credential in outbound payload', class:'CRITICAL_SECRET',
             desc:'Exposed API keys grant immediate access to provider accounts and billing. Rotate the key at its issuer and keep secrets out of prompts — or switch to a local model.' },
      CREDITCARD: { name:'Payment card number in outbound payload', class:'CRITICAL_PAYMENT',
             desc:'This is a checksum-valid card number. Card data must never reach a third-party model endpoint. Remove it, or switch to a local model.' },
      IBAN: { name:'Bank account (IBAN) in outbound payload', class:'CRITICAL_PAYMENT',
             desc:'International bank account numbers are blocked from egress. Remove it, or switch to a local model.' },
      CREDENTIAL: { name:'Password or secret assignment in outbound payload', class:'CRITICAL_SECRET',
             desc:'This looks like a live credential (a password/secret/token assignment with a high-entropy value). Remove it or replace the value with a placeholder — or switch to a local model.' },
    };
    window.VendettaCritical = CRITICAL;
    const LABELS = {
      EMAIL:'email', PHONE:'phone', SSN:'ssn', IP:'ip',
      APIKEY:'api-key', URL:'url', ADDRESS:'address', MONEY:'amount',
      NAME:'person', COMPANY:'entity', EMPID:'employee-id',
      CREDITCARD:'card', IBAN:'iban', JWT:'jwt', VIN:'vin', CREDENTIAL:'credential', MRZ:'passport-mrz'
    };
    function detect(text){
      const hits = [];
      for(const p of PATTERNS){
        p.re.lastIndex = 0;
        let m;
        while((m = p.re.exec(text)) !== null){
          let start = m.index, end = m.index + m[0].length, raw = m[0];
          if(p.cap && m[1] !== undefined){
            // Anchored patterns end with their capture group — the value is
            // the trailing substring of the match (lookahead tails excluded).
            raw = m[1];
            start = end - raw.length;
          }
          if(validate(p.kind, raw)){
            hits.push({ start, end, kind:p.kind, raw });
          }
          if(m.index === p.re.lastIndex) p.re.lastIndex++;
        }
      }
      hits.sort((a,b)=> a.start-b.start || (b.end-b.start)-(a.end-a.start));
      const out = [];
      let cursor = -1;
      for(const h of hits){ if(h.start >= cursor){ out.push(h); cursor = h.end; } }
      const counters = {};
      const map = new Map();
      for(const h of out){
        const key = h.kind+'::'+h.raw.toLowerCase();
        if(!map.has(key)){
          counters[h.kind] = (counters[h.kind]||0)+1;
          const idx = String(counters[h.kind]).padStart(2,'0');
          map.set(key, `{{${LABELS[h.kind]}_${idx}}}`);
        }
        h.alias = map.get(key);
      }
      return out;
    }
    window.Vendetta = { detect, LABELS };
  })();
  </script>
  <script type="text/babel" data-presets="react">
// Cinematic boot sequence + policy violation flash + threat radar + command palette
const { useState: useStateF, useEffect: useEffectF, useRef: useRefF } = React;

// ——————————————————————————————————————————————————————————————
// BOOT SEQUENCE
function BootSequence({ onDone }){
  const [step, setStep] = useStateF(0);
  const lines = [
    'BOOTING SENTYNYX KERNEL...',
    'HANDSHAKE · OPENAI · ANTHROPIC · GOOGLE · xAI · META',
    'INITIALIZING VENDETTA PERIMETER',
    'LOADING POLICY ENGINE · 147 RULES',
    'MOUNTING KNOWLEDGE ATLAS · 2.4TB',
    'TELEMETRY ONLINE · CRYPTO SEAL VERIFIED',
    'FLEET LINK ESTABLISHED',
  ];
  useEffectF(()=>{
    if(step >= lines.length){
      setTimeout(onDone, 500);
      return;
    }
    const t = setTimeout(()=>setStep(s=>s+1), step===0 ? 400 : 280);
    return ()=>clearTimeout(t);
  },[step]);

  return (
    <div style={bs.overlay}>
      <div style={bs.ring1}/>
      <div style={bs.ring2}/>
      <div style={bs.ring3}/>
      <div style={bs.core}/>
      <div style={bs.content}>
        <div style={bs.wordmark}>
          {'SENTYNYX'.split('').map((c,i)=>(
            <span key={i} style={{...bs.letter, animationDelay:(i*0.05)+'s'}}>{c}</span>
          ))}
        </div>
        <div style={bs.tagline}>THE LOCAL PRIVACY PERIMETER FOR LLMs</div>
        <div style={bs.console}>
          {lines.slice(0, step).map((l,i)=>(
            <div key={i} style={bs.line}>
              <span style={{color:'var(--neon)'}}>▸</span> {l}
              <span style={{color:'var(--neon)', marginLeft:8}}>OK</span>
            </div>
          ))}
          {step < lines.length && (
            <div style={{...bs.line, opacity:0.6}}>
              <span style={{color:'var(--neon)'}}>▸</span> {lines[step]}<span className="caret"/>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

}

// THREAT RADAR HUD (mini, floating)
function ThreatRadar(){
  const [sweep, setSweep] = useStateF(0);
  const [pings, setPings] = useStateF([]);
  const rafRef = useRefF();
  useEffectF(()=>{
    let running = true;
    const loop = ()=>{
      if(!running) return;
      setSweep(s => (s+2)%360);
      if(Math.random() < 0.02){
        setPings(p => [...p.slice(-8), {
          angle: Math.random()*360, r: 10+Math.random()*45,
          t: performance.now(), kind:['PII','KEY','FIN','ID'][Math.floor(Math.random()*4)]
        }]);
      }
      rafRef.current = requestAnimationFrame(loop);
    };
    loop();
    return ()=>{ running=false; cancelAnimationFrame(rafRef.current); };
  },[]);
  const now = performance.now();
  const livePings = pings.filter(p => now - p.t < 3000);

  return (
    <div style={tr.hud}>
      <div style={tr.head}>
        <span style={tr.dot}/>
        <span>THREAT RADAR</span>
        <span style={{marginLeft:'auto', color:'var(--neon)'}}>{livePings.length} ACTIVE</span>
      </div>
      <div style={tr.scope}>
        <svg viewBox="-60 -60 120 120" width="120" height="120">
          <defs>
            <radialGradient id="sweep">
              <stop offset="0%" stopColor="var(--neon)" stopOpacity="0.4"/>
              <stop offset="100%" stopColor="var(--neon)" stopOpacity="0"/>
            </radialGradient>
          </defs>
          <circle r="55" fill="rgba(242,255,43,0.02)" stroke="rgba(242,255,43,0.2)"/>
          <circle r="35" fill="none" stroke="rgba(242,255,43,0.1)"/>
          <circle r="15" fill="none" stroke="rgba(242,255,43,0.1)"/>
          <line x1="-55" y1="0" x2="55" y2="0" stroke="rgba(242,255,43,0.1)"/>
          <line x1="0" y1="-55" x2="0" y2="55" stroke="rgba(242,255,43,0.1)"/>
          <g transform={`rotate(${sweep})`}>
            <path d="M 0,0 L 55,0 A 55,55 0 0,1 27,47 z" fill="url(#sweep)"/>
          </g>
          {livePings.map((p,i)=>{
            const x = Math.cos(p.angle*Math.PI/180)*p.r;
            const y = Math.sin(p.angle*Math.PI/180)*p.r;
            const age = (now - p.t)/3000;
            return (
              <g key={i}>
                <circle cx={x} cy={y} r={2 + age*4} fill="none" stroke="var(--neon)" strokeWidth="0.5" opacity={1-age}/>
                <circle cx={x} cy={y} r="1.5" fill="var(--neon)" opacity={1-age}/>
              </g>
            );
          })}
        </svg>
      </div>
      <div style={tr.stats}>
        <div><span style={{color:'var(--neon)'}}>100%</span> scanned pre-egress</div>
        <div><span style={{color:'var(--neon)'}}>0</span> bytes leave this tab</div>
      </div>
    </div>
  );
}

function ConsensusArena({ prompt, models, onClose }){
  const [progress, setProgress] = useStateB(models.map(()=>0));
  const [phase, setPhase] = useStateB('stream'); // stream -> synth
  const targets = models.map((m,i)=>[
    `${m.name} sees the Vendetta-aliased payload and returns a ${['structured memo','rapid bullet list','narrative exec summary'][i]}. Emphasis on ${['completeness','speed','tone'][i]}. Re-hydrated locally.`,

  ].join('\n\n'));

  useEffectB(()=>{
    const ivs = models.map((_,i)=>{

        setProgress(p=>{
          const n=[...p];

          return n;
        });
      }, 18);
    });
    return ()=>ivs.forEach(clearInterval);
  },[]);

  useEffectB(()=>{
    if(progress.every((p,i)=>p >= targets[i].length) && phase==='stream'){

// AGENT DAG — animated tool-chain graph
function AgentDAG({ onClose }){
  const [step, setStep] = useStateB(0);
  const nodes = [
    { id:'prompt', label:'USER PROMPT',         x:80,  y:140, kind:'user' },
    { id:'vend1',  label:'VENDETTA · ingress',   x:240, y:140, kind:'vend' },
    { id:'plan',   label:'PLANNER',              x:400, y:140, kind:'llm', model:'Claude Opus 4.5' },
    { id:'search', label:'tool: web_search',     x:560, y:60,  kind:'tool' },
    { id:'db',     label:'tool: query_db',       x:560, y:140, kind:'tool' },
    { id:'code',   label:'tool: execute_python', x:560, y:220, kind:'tool' },
    { id:'synth',  label:'SYNTHESIZER',          x:720, y:140, kind:'llm', model:'GPT-5' },
    { id:'vend2',  label:'VENDETTA · egress',    x:880, y:140, kind:'vend' },
    { id:'user',   label:'RESPONSE',             x:1040,y:140, kind:'user' },
  ];
  const edges = [
    ['prompt','vend1'],['vend1','plan'],
    ['plan','search'],['plan','db'],['plan','code'],
    ['search','synth'],['db','synth'],['code','synth'],
    ['synth','vend2'],['vend2','user'],
  ];
  useEffectB(()=>{
    if(step >= edges.length) return;
    const t = setTimeout(()=>setStep(s=>s+1), 450);
    return ()=>clearTimeout(t);
  },[step]);

  const activeEdges = edges.slice(0, step);
  const activeNodes = new Set(['prompt']);
  activeEdges.forEach(([a,b])=>{ activeNodes.add(a); activeNodes.add(b); });

  const nodeColor = (k, active)=> !active ? '#2a2f3e' : (k==='vend' ? 'var(--neon)' : k==='tool' ? '#6effb0' : k==='llm' ? '#c78bff' : '#fff');

  return (
    <div style={ag.overlay}>
      <div style={ag.stage}>
        <div style={ag.header}>
          <div>
            <div style={{fontSize:10, letterSpacing:4, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace"}}>AGENT MODE</div>
            <div style={{fontFamily:"'Instrument Serif',serif", fontSize:32, marginTop:4}}>
              Tool-chain <em style={{color:'var(--neon)'}}>execution</em>
            </div>
            <div style={{fontSize:11, color:'var(--ink-2)', marginTop:4}}>Vendetta wraps every hop · in & out</div>
          </div>
          <button onClick={onClose} style={cd.close}>×</button>
        </div>

        <svg viewBox="0 0 1120 280" style={{width:'100%', height:400}}>
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--neon)"/>
            </marker>
          </defs>
          {edges.map(([a,b], i)=>{
            const na = nodes.find(n=>n.id===a);
            const nb = nodes.find(n=>n.id===b);
            const active = i < step;
            return (
              <g key={a+'-'+b}>
                <line x1={na.x+60} y1={na.y} x2={nb.x-60} y2={nb.y}
                  stroke={active ? 'var(--neon)' : '#2a2f3e'}
                  strokeWidth={active?1.5:1}
                  strokeDasharray={active?'':'3 4'}
                  markerEnd={active?'url(#arrow)':''}
                  style={active ? {filter:'drop-shadow(0 0 4px var(--neon))'} : {}}
                />
                {i === step-1 && (
                  <circle r="3" fill="var(--neon)">
                    <animateMotion dur="0.4s" fill="freeze" path={`M ${na.x+60},${na.y} L ${nb.x-60},${nb.y}`}/>
                  </circle>
                )}
              </g>
            );
          })}
          {nodes.map(n=>{
            const active = activeNodes.has(n.id);
            const c = nodeColor(n.kind, active);
            return (
              <g key={n.id} transform={`translate(${n.x},${n.y})`}>
                <rect x="-60" y="-22" width="120" height="44" rx="8"
                  fill={active ? 'rgba(10,12,20,0.9)' : 'rgba(10,12,20,0.5)'}
                  stroke={c}
                  strokeWidth="1"/>
                <text x="0" y="-2" fontSize="10" fontFamily="JetBrains Mono" fill={c} textAnchor="middle" letterSpacing="1">
                  {n.label}
                </text>
                {n.model && (
                  <text x="0" y="12" fontSize="8" fontFamily="JetBrains Mono" fill="#8b91a6" textAnchor="middle">
                    {n.model}
                  </text>
                )}
                {active && n.kind==='vend' && (
                  <circle cx="54" cy="-18" r="3" fill="var(--neon)">
                    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
                  </circle>
                )}
              </g>
            );
          })}
        </svg>

        <div style={ag.foot}>
          <div style={{display:'flex', gap:20, fontSize:10, fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, color:'var(--ink-2)'}}>
            <Legend c="var(--neon)" t="VENDETTA"/>
            <Legend c="#c78bff" t="LLM"/>
            <Legend c="#6effb0" t="TOOL"/>
            <Legend c="#fff" t="I/O"/>
          </div>
          <div style={{fontSize:10, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace", letterSpacing:1}}>
            {step >= edges.length ? '✓ CHAIN COMPLETE · 8 Vendetta hops · 3 tool calls · 1.4s' : `executing step ${step}/${edges.length}`}
          </div>
        </div>
      </div>
    </div>
  );
}
function Legend({ c, t }){
  return (
    <span style={{display:'inline-flex', alignItems:'center', gap:6}}>
      <span style={{width:8, height:8, borderRadius:99, background:c, boxShadow:`0 0 6px ${c}`}}/>
      <span>{t}</span>
    </span>
  );
}

const { useState: useStateC, useEffect: useEffectC, useRef: useRefC, useMemo: useMemoC } = React;

// ——————————————————————————————————————————————————————————————
// Build a highlighted mirror of the textarea content
function Highlighted({ text, spans }){
  if(spans.length === 0){
    return <span>{text}</span>;
  }
  const pieces = [];
  let cur = 0;
  spans.forEach((s, i)=>{
    if(s.start > cur){
      pieces.push(<span key={'p'+i}>{text.slice(cur, s.start)}</span>);
    }
    pieces.push(
      <span key={'h'+i} className={'vend-hit vend-'+s.kind}>
        <span className="vend-raw">{text.slice(s.start, s.end)}</span>
        <span className="vend-tag">{s.kind}</span>
      </span>
    );
    cur = s.end;
  });
  if(cur < text.length) pieces.push(<span key="tail">{text.slice(cur)}</span>);
  return <>{pieces}</>;
}

// ——————————————————————————————————————————————————————————————
function Composer({ model, onSend, spans, setSpans, text, setText, onToggleVendetta, vendettaOpen }){
  const taRef = useRefC(null);
  const mirrorRef = useRefC(null);

  // scan on every change
  useEffectC(()=>{
    const hits = window.Vendetta.detect(text);
    setSpans(hits);
  },[text]);

  // sync scroll between textarea and mirror
  const onScroll = ()=>{
    if(mirrorRef.current && taRef.current){
      mirrorRef.current.scrollTop = taRef.current.scrollTop;
      mirrorRef.current.scrollLeft = taRef.current.scrollLeft;
    }
  };

  const submit = ()=>{
    if(!text.trim()) return;
    onSend(text, spans);
    setText('');
  };

  const onKey = (e)=>{
    if(e.key === 'Enter' && (e.metaKey || e.ctrlKey)){
      e.preventDefault();
      submit();
    }
  };

  const { PROVIDER_GLYPHS } = window.SENTYNYX;

  return (
    <div style={cx.wrap}>
      {/* ambient glow when spans found */}
      <div style={{...cx.glow, opacity: spans.length>0 ? 1 : 0}}/>

      <div style={{...cx.shell, borderColor: spans.length>0 ? 'rgba(242,255,43,0.4)' : 'rgba(255,255,255,0.1)'}}>
        {/* Vendetta live strip */}
        <div style={cx.liveStrip}>
          <div style={cx.liveLeft}>
            <span style={cx.liveDotY}/>
            <span style={{fontSize:10, letterSpacing:2, fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-2)'}}>
              VENDETTA
            </span>
            <span style={{fontSize:10, color: spans.length>0 ? 'var(--neon)' : 'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace"}}>
              {spans.length > 0
                ? `${spans.length} sensitive ${spans.length===1?'token':'tokens'} detected · will be anonymized before ${model.provider}`
                : 'Listening · no PII in buffer'}
            </span>
          </div>
          <button onClick={onToggleVendetta} style={cx.livePanelBtn}>
            {vendettaOpen ? 'HIDE' : 'VIEW'} PANEL →
          </button>
        </div>

        <div style={cx.editorWrap}>
          {/* Mirror div with highlights (z-index under textarea) */}
          <div ref={mirrorRef} style={cx.mirror} aria-hidden="true">
            <Highlighted text={text + '\u200b'} spans={spans}/>
          </div>
          {/* The actual textarea, transparent text */}
          <textarea
            ref={taRef}
            value={text}
            onChange={e=>setText(e.target.value)}
            onScroll={onScroll}
            onKeyDown={onKey}
            placeholder="Transmit to the fleet…  (⌘↵ to send)"
            style={cx.textarea}
            spellCheck={false}
          />
        </div>

        <div style={cx.toolbar}>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <button style={cx.toolBtn} title="Attach">
              <span style={{fontSize:14}}>⏚</span>
            </button>
            <button style={cx.toolBtn} title="Knowledge base">
              <span style={{fontSize:12}}>⌯</span>
              <span>Atlas</span>
            </button>
            <button style={cx.toolBtn} title="Tools">
              <span style={{fontSize:12}}>∷</span>
              <span>Tools</span>
            </button>
            <button style={cx.toolBtn} title="Voice">
              <span style={{fontSize:12}}>◉</span>
            </button>
          </div>

          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={cx.routeInfo}>
              <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--ink-3)', letterSpacing:1}}>ROUTE</span>
              <span style={{fontSize:11}}>
                <span style={{color:'var(--neon)'}}>⛨</span> Vendetta
                <span style={{color:'var(--ink-3)', margin:'0 6px'}}>→</span>
                <span style={{color:model.color}}>{PROVIDER_GLYPHS[model.provider]}</span> {model.name}
              </span>
            </div>
            <button onClick={submit} style={{...cx.sendBtn, opacity: text.trim()?1:0.4}}>
              <span>Transmit</span>
              <span style={{fontSize:14}}>↗</span>

      </div>

        <span>{text.length} chars</span>
        <span>·</span>
        <span>~{Math.ceil(text.length/4)} tokens</span>
        <span>·</span>
        <span>Payload egress is end-to-end scanned by the Vendetta engine</span>
      </div>
    </div>
  );
}

  const scroller = useRefC(null);
  useEffectC(()=>{
    if(scroller.current) scroller.current.scrollTop = scroller.current.scrollHeight;
  },[messages]);

  const { PROVIDER_GLYPHS } = window.SENTYNYX;

      {messages.map((m,i)=>(

    </div>
  );
}

function MessageBlock({ m, model, glyph }){
  const [view, setView] = React.useState('rehydrated');
  if(m.role === 'user'){
    return (
      <div style={cx.msgUser}>
        <div style={cx.msgUserHead}>
          <div style={cx.avatarU}>KA</div>

        <div style={cx.msgUserBody}>
          <Highlighted text={m.text} spans={m.spans||[]}/>
        </div>

  // Build aliased version of the text: replace references like placeholders
  const aliasedReply = m.spans && m.spans.length
    ? `Routed through the Vendetta perimeter. ${m.spans.length} sensitive tokens were aliased. The upstream model saw:

> "Draft a memo to the ${m.spans.slice(0,2).map(s=>s.alias).join(' / ')} exec team summarizing Q4 results. Include projected revenue of ${m.spans.find(s=>s.kind==='MONEY')?.alias||'{{amount_01}}'} and cc ${m.spans.find(s=>s.kind==='NAME')?.alias||'{{person_01}}'}..."

Response returned structural — values re-hydrated locally before display.`
    : m.text;

  return (
    <div style={cx.msgAssist}>
      <div style={cx.msgAssistHead}>
        <div style={{...cx.avatarA, background:model.color+'22', color:model.color, borderColor: model.color+'66'}}>

            <div style={cx.dualToggle}>
              <button onClick={()=>setView('rehydrated')} style={{...cx.dualTab, ...(view==='rehydrated'?cx.dualTabOn:{})}}>You see</button>

            </div>
          )}
        </div>
      </div>
      <div style={{...cx.msgAssistBody, ...(view==='aliased'?cx.msgAliased:{})}}>
        {view === 'rehydrated' ? (
          <>
            {m.text.split('\n').map((ln,i)=><div key={i} style={{marginBottom: ln?8:0}}>{ln || '\u00A0'}</div>)}
            {m.streaming && <span className="caret"/>}

        ) : (
          <div style={cx.aliasView}>
            <div style={{fontSize:10, letterSpacing:2, color:'var(--neon)', fontFamily:"'JetBrains Mono',monospace", marginBottom:10}}>

            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Orbital Model Picker — satellites orbiting a core
const { useState: useStateO, useEffect: useEffectO, useRef: useRefO } = React;

function OrbitalPicker({ model, setModel, onClose }){
  const { MODELS, PROVIDER_GLYPHS } = window.SENTYNYX;
  const [hover, setHover] = useStateO(null);
  const [rot, setRot] = useStateO(0);
  const rafRef = useRefO();

  useEffectO(()=>{
    let running = true;
    const loop = ()=>{
      if(!running) return;
      setRot(r => r + 0.05);
      rafRef.current = requestAnimationFrame(loop);
    };
    loop();
    return ()=>{ running = false; cancelAnimationFrame(rafRef.current); };
  },[]);

  // Arrange in 3 concentric orbits
  const orbits = [
    { r: 120, ms: MODELS.slice(0, 5),   speed: 1.0 },
    { r: 200, ms: MODELS.slice(5, 10),  speed: 0.6 },
    { r: 280, ms: MODELS.slice(10, 14), speed: 0.3 },
  ];

  return (
    <div style={op.overlay} onClick={onClose}>
      <div style={op.stage} onClick={e=>e.stopPropagation()}>
        <div style={op.header}>
          <div>
            <div style={{fontSize:10, letterSpacing:4, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace"}}>FLEET</div>
            <div style={{fontFamily:"'Instrument Serif',serif", fontSize:34, marginTop:4}}>
              Choose your <em style={{color:'var(--neon)'}}>orbit</em>
            </div>
          </div>
          <button onClick={onClose} style={op.close}>×</button>
        </div>

        <div style={op.galaxy}>
          {/* Orbit rings */}
          <svg style={op.orbits} viewBox="-320 -320 640 640">
            {orbits.map((o,i)=>(
              <circle key={i} cx="0" cy="0" r={o.r} fill="none"
                stroke="rgba(242,255,43,0.15)" strokeWidth="0.5"
                strokeDasharray="2 6"/>
            ))}
            {/* Core glow */}
            <circle cx="0" cy="0" r="55" fill="url(#coreGlow)"/>
            <defs>
              <radialGradient id="coreGlow">
                <stop offset="0%" stopColor="#f2ff2b" stopOpacity="0.8"/>
                <stop offset="50%" stopColor="#f2ff2b" stopOpacity="0.2"/>
                <stop offset="100%" stopColor="#f2ff2b" stopOpacity="0"/>
              </radialGradient>
            </defs>
          </svg>

          {/* Core label */}
          <div style={op.core}>
            <div style={{fontSize:9, letterSpacing:3, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace"}}>VENDETTA</div>
            <div style={{fontSize:12, color:'var(--neon)', fontFamily:"'JetBrains Mono',monospace", marginTop:2}}>PERIMETER</div>
            <div style={op.coreDot}/>
          </div>

          {/* Satellites */}
          {orbits.map((o, oi)=>
            o.ms.map((m, mi)=>{
              const total = o.ms.length;
              const angle = (rot * o.speed) + (mi * (360/total));
              const rad = (angle * Math.PI)/180;
              const x = Math.cos(rad) * o.r;
              const y = Math.sin(rad) * o.r;
              const active = m.id === model.id;
              const isHover = hover === m.id;
              return (
                <button
                  key={m.id}
                  onMouseEnter={()=>setHover(m.id)}
                  onMouseLeave={()=>setHover(null)}
                  onClick={()=>{ setModel(m); setTimeout(onClose, 300); }}
                  style={{
                    ...op.sat,
                    transform:`translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`,
                    borderColor: active ? 'var(--neon)' : (isHover ? m.color : 'rgba(255,255,255,0.15)'),
                    background: active ? 'rgba(242,255,43,0.15)' : 'rgba(10,12,20,0.8)',
                    boxShadow: active ? '0 0 24px rgba(242,255,43,0.6)' : (isHover ? `0 0 16px ${m.color}66` : 'none'),
                    zIndex: isHover || active ? 10 : 1
                  }}
                >
                  <span style={{color:m.color, fontSize:16}}>{PROVIDER_GLYPHS[m.provider]}</span>
                  {(isHover || active) && (
                    <div style={op.satLabel}>
                      <div style={{fontSize:11, fontWeight:600}}>{m.name}</div>
                      <div style={{fontSize:9, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace", marginTop:2}}>
                        {m.provider} · {m.ctx} · {m.flash}
                      </div>
                    </div>
                  )}
                  {active && <div style={op.dockRing}/>}
                </button>
              );
            })
          )}

          {/* Connection beam from core to active */}
          {(()=>{
            const m = MODELS.find(x=>x.id===model.id);
            const oi = MODELS.indexOf(m) < 5 ? 0 : MODELS.indexOf(m) < 10 ? 1 : 2;
            const o = orbits[oi];
            const idxInOrbit = o.ms.findIndex(x=>x.id===m.id);
            const angle = (rot * o.speed) + (idxInOrbit * (360/o.ms.length));
            const rad = (angle * Math.PI)/180;
            const x = Math.cos(rad) * o.r;
            const y = Math.sin(rad) * o.r;
            return (
              <svg style={op.beam} viewBox="-320 -320 640 640">
                <line x1="0" y1="0" x2={x} y2={y}
                  stroke="var(--neon)" strokeWidth="1" opacity="0.5"
                  strokeDasharray="3 3"/>
              </svg>
            );
          })()}
        </div>

        <div style={op.footer}>
          <div style={{display:'flex', gap:16, fontSize:11, color:'var(--ink-2)', fontFamily:"'JetBrains Mono',monospace"}}>
            <span><span style={{color:'var(--neon)'}}>●</span> Active: {model.name}</span>
            <span>·</span>
            <span>{MODELS.length} models across 9 providers</span>
          </div>
          <div style={{fontSize:10, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace", letterSpacing:1}}>
            All satellites route through Vendetta before contact
          </div>
        </div>
      </div>
    </div>
  );
}

// Vendetta X-ray Beam — dramatic scan + particle redaction on transmit
const { useState: useStateX, useEffect: useEffectX, useRef: useRefX } = React;

function XrayBeam({ text, spans, model, onDone }){
  const [phase, setPhase] = useStateX('scan'); // scan -> excise -> launch -> done
  const [progress, setProgress] = useStateX(0);
  const { PROVIDER_GLYPHS } = window.SENTYNYX;

  useEffectX(()=>{
    let raf, start = performance.now();
    const total = 2600;
    const tick = (t)=>{
      const p = Math.min(1, (t - start)/total);
      setProgress(p);
      if(p < 0.45) setPhase('scan');
      else if(p < 0.75) setPhase('excise');
      else if(p < 1) setPhase('launch');
      else { setPhase('done'); onDone(); return; }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[]);

  return (
    <div style={xb.overlay}>
      <div style={xb.frame}>
        {/* Corner brackets */}
        <span style={{...xb.corner, top:12, left:12, borderTop:'2px solid var(--neon)', borderLeft:'2px solid var(--neon)'}}/>
        <span style={{...xb.corner, top:12, right:12, borderTop:'2px solid var(--neon)', borderRight:'2px solid var(--neon)'}}/>
        <span style={{...xb.corner, bottom:12, left:12, borderBottom:'2px solid var(--neon)', borderLeft:'2px solid var(--neon)'}}/>
        <span style={{...xb.corner, bottom:12, right:12, borderBottom:'2px solid var(--neon)', borderRight:'2px solid var(--neon)'}}/>

        <div style={xb.topBar}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <span style={xb.dot}/>
            <span style={{fontSize:10, letterSpacing:3, fontFamily:"'JetBrains Mono',monospace", color:'var(--neon)'}}>
              VENDETTA · {phase.toUpperCase()}
            </span>
          </div>
          <div style={{fontSize:10, fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-2)'}}>
            {(progress*100).toFixed(0)}% · {spans.length} tokens
          </div>
        </div>

        <div style={xb.content}>
          <TextScan text={text} spans={spans} phase={phase} progress={progress}/>
        </div>

        <div style={xb.footBar}>
          <div style={{fontSize:10, fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-3)', letterSpacing:1}}>
            {phase==='scan' && '▸ PERIMETER SWEEP · scanning all tokens'}
            {phase==='excise' && '▸ EXCISING · sensitive tokens aliased'}
            {phase==='launch' && `▸ LAUNCH · routing to ${model.provider}`}
          </div>
          <div style={{display:'flex', alignItems:'center', gap:8, fontSize:10, fontFamily:"'JetBrains Mono',monospace"}}>
            <span style={{color:model.color}}>{PROVIDER_GLYPHS[model.provider]}</span>
            <span style={{color:'var(--ink-1)'}}>{model.name}</span>
          </div>
        </div>

        <div style={xb.progressBar}>
          <div style={{...xb.progressFill, width:`${progress*100}%`}}/>
        </div>
      </div>
    </div>
  );
}

function TextScan({ text, spans, phase, progress }){
  // Scan line position
  const scanPos = phase === 'scan' ? (progress/0.45) : 1;

  return (
    <div style={xb.scanWrap}>
      <div style={xb.textReveal}>
        {renderAnimatedText(text, spans, phase, progress)}
      </div>

      {/* Scan line */}
      {phase === 'scan' && (
        <div style={{
          ...xb.scanLine,
          top: `${scanPos * 100}%`
        }}/>
      )}

      {/* Post-scan indexing grid */}
      {(phase === 'excise' || phase === 'launch') && (
        <div style={xb.indexOverlay}>
          {spans.slice(0, 8).map((s,i)=>(
            <div key={i} style={{
              ...xb.indexChip,
              animation: `chipIn 0.4s ${i*0.06}s both`
            }}>
              <span style={{color:'var(--ink-3)', fontSize:9}}>{s.kind}</span>
              <span style={{color:'var(--ink-3)'}}>→</span>
              <span style={{color:'var(--neon)'}}>{s.alias}</span>
            </div>
          ))}
          {spans.length > 8 && (
            <div style={{...xb.indexChip, color:'var(--ink-2)'}}>
              +{spans.length - 8} more
            </div>
          )}
        </div>
      )}

      {/* Launch particles */}
      {phase === 'launch' && (
        <div style={xb.launchFx}>
          {Array.from({length:24}).map((_,i)=>(
            <span key={i} style={{
              ...xb.particle,
              left: `${Math.random()*100}%`,
              top: `${30 + Math.random()*40}%`,
              animation: `launchUp ${0.6 + Math.random()*0.4}s ${Math.random()*0.3}s ease-out forwards`
            }}/>
          ))}
        </div>
      )}
    </div>
  );
}

function renderAnimatedText(text, spans, phase, progress){
  if(!spans.length) return <span style={{whiteSpace:'pre-wrap'}}>{text}</span>;
  const parts = [];
  let cur = 0;
  spans.forEach((s,i)=>{
    if(s.start > cur) parts.push(<span key={'p'+i}>{text.slice(cur, s.start)}</span>);
    if(phase === 'scan'){
      parts.push(<span key={'h'+i} className="vend-hit" style={{background:'rgba(242,255,43,0.3)'}}>{text.slice(s.start, s.end)}</span>);
    } else if(phase === 'excise'){
      parts.push(
        <span key={'h'+i} className="excising" style={{
          display:'inline-block',
          animation: `excise 0.5s ${i*0.04}s forwards`,
          position:'relative'
        }}>
          <span style={{background:'rgba(242,255,43,0.4)', padding:'1px 4px', borderRadius:3}}>
            {text.slice(s.start, s.end)}
          </span>
        </span>
      );
    } else {
      // launch/done: show alias in place
      parts.push(
        <span key={'h'+i} style={{
          color:'var(--neon)',
          background:'rgba(242,255,43,0.1)',
          padding:'1px 4px', borderRadius:3,
          fontFamily:"'JetBrains Mono',monospace",
          fontSize:'0.9em',
          animation:'aliasIn 0.4s forwards'
        }}>
          {s.alias}
        </span>
      );
    }
    cur = s.end;
  });
  if(cur < text.length) parts.push(<span key="tail">{text.slice(cur)}</span>);
  return <span style={{whiteSpace:'pre-wrap', lineHeight:1.8}}>{parts}</span>;
}

      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='d'){ e.preventDefault(); setComplianceOpen(true); }
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='g'){ e.preventDefault(); setAgentOpen(true); }
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='o'){ e.preventDefault(); setOrbitalOpen(true); }
    };
    window.addEventListener('keydown', h);
    return ()=>window.removeEventListener('keydown', h);
  },[]);

  const runCmd = (k)=>{
    if(k==='orbital') setOrbitalOpen(true);
    if(k==='consensus') setConsensusOpen(true);
    if(k==='compliance') setComplianceOpen(true);
    if(k==='agent') setAgentOpen(true);
    if(k==='toggle-v') setVendettaOpen(o=>!o);
    if(k==='newchat') setMessages([]);
  };

  useEffectA(()=>{
    const handler = (e)=>{
      if(!e.data) return;
      if(e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if(e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  const updateTweak = (k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(e){}
      return next;
    });
    if(k === 'accent'){
      document.documentElement.style.setProperty('--neon', v);
    }
  };

  useEffectA(()=>{
    document.documentElement.style.setProperty('--neon', tweaks.accent);
  },[tweaks.accent]);

  const send = (text, sp)=>{
    // Check for critical policy violations
    const crit = sp.find(s => window.VendettaCritical && window.VendettaCritical[s.kind]);
    if(crit){
      setViolation({ ...window.VendettaCritical[crit.kind], raw: crit.raw });
      return;
    }
    setXraying({ text, spans: sp });
  };

  const actuallyTransmit = (text, sp)=>{
    setXraying(null);
    setMessages(ms => [...ms, { role:'user', text, spans:sp }]);
    // Fake streaming assistant reply
    const reply = makeReply(text, sp, model);
    setMessages(ms => [...ms, { role:'assistant', text:'', streaming:true, spans:sp }]);
    let i = 0;
    const iv = setInterval(()=>{
      i += Math.max(1, Math.floor(Math.random()*3));
      setMessages(ms => {
        const copy = ms.slice();
        const last = copy[copy.length-1];
        if(!last || last.role!=='assistant') return ms;
        copy[copy.length-1] = { ...last, text: reply.slice(0, i), streaming: i<reply.length };
        return copy;
      });
      if(i >= reply.length) clearInterval(iv);
    }, 18);
  };

  const { Sidebar, TopBar, VendettaPanel } = window.UI_CHROME;
  const { Composer, Transcript } = window.UI_CHAT;

  return (
    <>
      <BootOverlay visible={booting}/>
      <div style={{display:'flex', flex:1, minHeight:0}}>
        <Sidebar activeId={activeConvo} onSelect={setActiveConvo} onNew={()=>setMessages([])}/>
        <div style={{flex:1, display:'flex', flexDirection:'column', minWidth:0, position:'relative'}}>
          <TopBar model={model} setModel={setModel}
            onOpenVendetta={()=>setVendettaOpen(o=>!o)}
            onOpenOrbital={()=>setOrbitalOpen(true)}
            onOpenCmd={()=>setCmdOpen(true)}
            onOpenConsensus={()=>setConsensusOpen(true)}
            onOpenCompliance={()=>setComplianceOpen(true)}
            onOpenAgent={()=>setAgentOpen(true)}/>
          <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0, marginRight: vendettaOpen ? 360 : 0, transition:'margin 0.35s'}}>
            <Transcript messages={messages} model={model}/>
            <Composer
              model={model}
              onSend={send}
              spans={spans}
              setSpans={setSpans}
              text={draft}
              setText={setDraft}
              onToggleVendetta={()=>setVendettaOpen(o=>!o)}
              vendettaOpen={vendettaOpen}
            />
          </div>
        </div>
      </div>
      <VendettaPanel
        spans={spans}
        open={vendettaOpen}
        onClose={()=>setVendettaOpen(false)}
        rawText={draft}
        aliasMode={aliasMode}
        setAliasMode={setAliasMode}
      />
      {tweaksOpen && <TweaksPanel tweaks={tweaks} update={updateTweak} onClose={()=>setTweaksOpen(false)}/>}
      {orbitalOpen && <window.ORBITAL.OrbitalPicker model={model} setModel={setModel} onClose={()=>setOrbitalOpen(false)}/>}
      {xraying && <window.XRAY.XrayBeam text={xraying.text} spans={xraying.spans} model={model} onDone={()=>actuallyTransmit(xraying.text, xraying.spans)}/>}
      {showBoot && <window.FEATURES.BootSequence onDone={()=>setShowBoot(false)}/>}
      {violation && <window.FEATURES.PolicyViolation rule={violation} onDismiss={()=>setViolation(null)}/>}
      {cmdOpen && <window.FEATURES.CommandPalette open={cmdOpen} onClose={()=>setCmdOpen(false)} onAction={runCmd}/>}
      {consensusOpen && <window.BIG.ConsensusArena prompt={draft} models={[MODELS[3], MODELS[0], MODELS[6]]} onClose={()=>setConsensusOpen(false)}/>}
      {complianceOpen && <window.BIG.ComplianceDashboard onClose={()=>setComplianceOpen(false)}/>}
      {agentOpen && <window.BIG.AgentDAG onClose={()=>setAgentOpen(false)}/>}
      {!showBoot && <window.FEATURES.ThreatRadar/>}
    </>
  );
}

// ——————————————————————————————————————————————————————————————
function TweaksPanel({ tweaks, update, onClose }){
  const accents = [
    { c:'#f2ff2b', n:'Electric'},
    { c:'#b3ff3c', n:'Toxic'},
    { c:'#ff3cc1', n:'Fuchsia'},
    { c:'#3cf0ff', n:'Plasma'},
    { c:'#ff7a2b', n:'Ember'},
    { c:'#ffffff', n:'White'},
  ];
  return (
    <div style={{
      position:'fixed', right:20, bottom:20, width:300, zIndex:200,
      background:'rgba(10,12,20,0.94)', backdropFilter:'blur(20px)',
      border:'1px solid rgba(255,255,255,0.12)', borderRadius:12,
      boxShadow:'0 20px 60px rgba(0,0,0,0.6)', padding:16, color:'#fff'
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
        <div style={{fontSize:11, letterSpacing:3, fontFamily:"'JetBrains Mono',monospace", color:'var(--ink-2)'}}>TWEAKS</div>
        <button onClick={onClose} style={{background:'transparent', border:'1px solid var(--line)', color:'var(--ink-1)', borderRadius:6, width:24, height:24, cursor:'pointer'}}>×</button>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:10, letterSpacing:2, color:'var(--ink-3)', marginBottom:8, fontFamily:"'JetBrains Mono',monospace"}}>NEON ACCENT</div>
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {accents.map(a=>(
            <button key={a.c} onClick={()=>update('accent', a.c)} title={a.n} style={{
              width:28, height:28, borderRadius:6,
              background:a.c, cursor:'pointer',
              border: tweaks.accent===a.c ? '2px solid #fff' : '1px solid rgba(255,255,255,0.1)',
              boxShadow: tweaks.accent===a.c ? `0 0 12px ${a.c}` : 'none'
            }}/>
          ))}
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:10, letterSpacing:2, color:'var(--ink-3)', marginBottom:8, fontFamily:"'JetBrains Mono',monospace"}}>DEFAULT MODEL</div>
        <select value={tweaks.defaultModelIdx} onChange={e=>update('defaultModelIdx', +e.target.value)}
          style={{width:'100%', padding:8, background:'rgba(255,255,255,0.03)', border:'1px solid var(--line)', color:'#fff', borderRadius:6, fontSize:12}}>
          {window.SENTYNYX.MODELS.map((m,i)=>(
            <option key={m.id} value={i} style={{background:'#10131c'}}>{m.provider} — {m.name}</option>
          ))}
        </select>
      </div>

      <div style={{display:'flex', gap:10, marginBottom:10}}>
        <label style={{display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--ink-1)', cursor:'pointer'}}>
          <input type="checkbox" checked={tweaks.starfield} onChange={e=>update('starfield', e.target.checked)}/>
          Starfield
        </label>
        <label style={{display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--ink-1)', cursor:'pointer'}}>
          <input type="checkbox" checked={tweaks.scanAnim} onChange={e=>update('scanAnim', e.target.checked)}/>
          Scan animation
        </label>
      </div>

      <div style={{fontSize:9, color:'var(--ink-3)', fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, marginTop:8}}>
        Try typing more PII in the composer to see Vendetta react in real-time.
      </div>
    </div>
  );
}

// ——————————————————————————————————————————————————————————————
function makeReply(text, spans, model){
  const n = spans.length;
  const list = [...new Set(spans.map(s=>s.kind))].map(k=>k.toLowerCase()).join(', ') || 'none';
  return `Routed through the Vendetta perimeter. ${n} sensitive token${n===1?'':'s'} (${list}) were aliased before the payload reached ${model.provider}. The upstream model saw only structural placeholders — response values have been re-hydrated locally.

Here is a draft based on your brief:

• Executive summary is scoped to the quarter's financial narrative without exposing counterparties.
• Placeholder callouts map back to the original entities only on your machine.
• Suggested next steps are non-destructive — no outbound action will execute until you approve.

Want me to tighten the tone, expand the financial section, or pivot to a slide outline?`;
}

// ——————————————————————————————————————————————————————————————
function BootOverlay({ visible }){
  return (
    <div style={{
      position:'fixed', inset:0, zIndex:1000,
      background:'radial-gradient(ellipse at center, rgba(5,6,10,0.95), #05060a 70%)',
      display:'flex', alignItems:'center', justifyContent:'center',
      opacity: visible?1:0, pointerEvents: visible?'auto':'none',
      transition:'opacity 0.6s'
    }}>
      <div style={{textAlign:'center'}}>
        <div style={{position:'relative', width:120, height:120, margin:'0 auto 20px'}}>
          <div style={{
            position:'absolute', inset:0, borderRadius:'50%',
            border:'1px solid rgba(242,255,43,0.2)',
            animation:'spin 4s linear infinite'
          }}/>
          <div style={{
            position:'absolute', inset:10, borderRadius:'50%',
            border:'1px solid rgba(242,255,43,0.4)', borderTopColor:'transparent',
            animation:'spin 2s linear infinite reverse'
          }}/>
          <div style={{
            position:'absolute', inset:'40%', borderRadius:'50%',
            background:'var(--neon)', boxShadow:'0 0 40px var(--neon)'
          }}/>
        </div>
        <div style={{fontSize:10, letterSpacing:6, color:'var(--neon)',
                     fontFamily:"'JetBrains Mono',monospace"}}>
          SENTYNYX · ORBITAL HANDSHAKE
        </div>
        <div style={{fontSize:10, letterSpacing:3, color:'var(--ink-3)',
                     fontFamily:"'JetBrains Mono',monospace", marginTop:8}}>
          Vendetta perimeter online
        </div>
      </div>
    </div>
  );
}

  /* Hover polish */
  button[style*="newBtn"]:hover,

  .sug-card:hover { border-color: rgba(242,255,43,0.3) !important; }

  textarea::placeholder { color: rgba(255,255,255,0.25); }

  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes chipIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
  @keyframes excise {
